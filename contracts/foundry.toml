[profile.default]
src = "src"
out = "out"
libs = ["lib"]

# Pinned: the README claims 0.8.35 and nothing was enforcing it.
solc = "0.8.35"

[rpc_endpoints]
base = "${BASE_RPC_URL}"

[etherscan]
base = { key = "${BASESCAN_API_KEY}", chain = 8453 }

